<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Chat App | Suneel Kumar</title>
    <link rel="stylesheet" href="stylechat.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2><i class="fas fa-comments"></i> ChatApp</h2>
            <button class="theme-toggle" id="themeToggle">
                <i class="fas fa-moon"></i>
            </button>
        </div>
        
        <div class="user-profile">
            <img src="https://via.placeholder.com/50" alt="User Avatar" class="avatar">
            <div>
                <h4 id="currentUser">Guest User</h4>
                <span class="status online" id="userStatus"></span>
            </div>
        </div>

        <div class="chat-list" id="chatList">
            <!-- Dynamic chat rooms will be populated here -->
        </div>
    </div>

    <!-- Main Chat Area -->
    <div class="main-chat" id="mainChat">
        <!-- Login Screen -->
        <div class="login-screen" id="loginScreen">
            <div class="login-card">
                <div class="login-header">
                    <i class="fas fa-rocket"></i>
                    <h1>Welcome to ChatApp</h1>
                    <p>Join the conversation in real-time!</p>
                </div>
                <form id="loginForm">
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" id="username" placeholder="Enter your name" required>
                    </div>
                    <button type="submit" class="btn-primary">
                        <i class="fas fa-sign-in-alt"></i> Join Chat
                    </button>
                </form>
            </div>
        </div>

        <!-- Chat Screen -->
        <div class="chat-screen" id="chatScreen" style="display: none;">
            <div class="chat-header">
                <button class="menu-toggle" id="menuToggle">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="chat-info">
                    <h3 id="roomName">General</h3>
                    <span class="online-count" id="onlineCount">1 online</span>
                </div>
                <div class="chat-actions">
                    <button class="btn-icon" id="emojiBtn">
                        <i class="fas fa-smile"></i>
                    </button>
                    <button class="btn-icon" id="voiceBtn">
                        <i class="fas fa-microphone"></i>
                    </button>
                </div>
            </div>

            <div class="messages-container" id="messagesContainer">
                <div class="welcome-message">
                    <i class="fas fa-comments"></i>
                    <h3>Say hello to start chatting!</h3>
                    <p>Messages appear here in real-time</p>
                </div>
            </div>

            <div class="message-input-container">
                <div class="message-input-wrapper">
                    <button class="attach-btn" id="attachBtn">
                        <i class="fas fa-paperclip"></i>
                    </button>
                    <input type="text" id="messageInput" placeholder="Type a message..." maxlength="500">
                    <button class="send-btn" id="sendBtn">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
                <div class="typing-indicator" id="typingIndicator"></div>
            </div>
        </div>
    </div>

    <!-- Emoji Picker -->
    <div class="emoji-picker" id="emojiPicker">
        <div class="emoji-categories">
            <button class="emoji-category active" data-category="recent">Recent</button>
            <button class="emoji-category" data-category="smileys">😀 Smileys</button>
            <button class="emoji-category" data-category="people">🙌 People</button>
            <button class="emoji-category" data-category="nature">🌟 Nature</button>
        </div>
        <div class="emoji-grid" id="emojiGrid"></div>
    </div>

    <script src="chatscript.js"></script>
</body>
</html>
